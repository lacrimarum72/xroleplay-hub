<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>X-Roleplay – Live Creator Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#05030f;
  --bg2:#0a0718;
  --card:#0f0c1e;
  --card2:#130f24;
  --ac:#7c3aed;
  --ac2:#a855f7;
  --ac3:#c084fc;
  --glow:rgba(124,58,237,.5);
  --glow2:rgba(168,85,247,.3);
  --red:#ef4444;
  --redglow:rgba(239,68,68,.4);
  --bdr:rgba(124,58,237,.2);
  --bdrh:rgba(168,85,247,.5);
  --t1:#f8f4ff;
  --t2:#b8a8d8;
  --t3:#6b5a8a;
  --live:#ff3b3b;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;overflow-x:hidden}

/* NOISE + GRADIENT BG */
body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse 70% 50% at 15% 0%,rgba(124,58,237,.18) 0%,transparent 60%),
    radial-gradient(ellipse 50% 40% at 85% 100%,rgba(168,85,247,.12) 0%,transparent 55%),
    radial-gradient(ellipse 30% 30% at 50% 50%,rgba(124,58,237,.06) 0%,transparent 70%);
  pointer-events:none;z-index:0
}
body::after{
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events:none;z-index:0;opacity:.4
}

/* NAV */
nav{
  position:sticky;top:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 32px;height:64px;
  background:rgba(5,3,15,.85);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--bdr);
}
.logo{display:flex;align-items:center;gap:11px;text-decoration:none;color:var(--t1)}
.logo-icon{
  width:34px;height:34px;
  background:linear-gradient(135deg,var(--ac),var(--ac2));
  clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%);
  display:grid;place-items:center;
  font-family:'Exo 2',sans-serif;font-weight:900;font-size:14px;color:#fff;
  box-shadow:0 0 20px var(--glow);
}
.logo-text{font-family:'Exo 2',sans-serif;font-size:20px;font-weight:800;letter-spacing:1px}
.logo-text span{color:var(--ac3)}
.nav-right{display:flex;align-items:center;gap:20px}
.nav-badge{
  font-family:'Exo 2',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;
  color:var(--t2);
}
.nav-badge em{color:var(--ac3);font-style:normal;margin-right:6px}
.nav-live{display:flex;align-items:center;gap:7px;padding:5px 14px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:20px;font-size:11px;font-weight:700;color:#ff8080;letter-spacing:1.2px}
.nav-live-dot{width:7px;height:7px;border-radius:50%;background:var(--live);box-shadow:0 0 8px var(--redglow);animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.7)}}
.nav-analytics{padding:5px 14px;border-radius:8px;font-size:12px;font-weight:500;color:var(--t2);border:1px solid var(--bdr);text-decoration:none;transition:all .2s;background:transparent}
.nav-analytics:hover{color:var(--t1);border-color:var(--bdrh);background:rgba(124,58,237,.1)}

/* MAIN */
main{position:relative;z-index:1;max-width:1440px;margin:0 auto;padding:32px 28px 80px}

/* HEADER */
.header{margin-bottom:28px}
.header h1{font-family:'Exo 2',sans-serif;font-size:36px;font-weight:900;letter-spacing:-0.5px;line-height:1.1}
.header h1 em{
  font-style:normal;
  background:linear-gradient(90deg,var(--ac2),var(--ac3));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.header p{margin-top:6px;color:var(--t2);font-size:14px;font-weight:400}
.header-stats{display:flex;gap:28px;margin-top:16px}
.hstat{display:flex;align-items:baseline;gap:8px}
.hstat-val{font-family:'Exo 2',sans-serif;font-size:28px;font-weight:900;color:var(--ac3);line-height:1}
.hstat-label{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:1px}

/* FILTER BAR */
.fbar{display:flex;align-items:center;gap:8px;margin-bottom:22px;flex-wrap:wrap}
.fb{
  padding:7px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;
  border:1px solid var(--bdr);background:transparent;color:var(--t2);
  transition:all .2s;font-family:'Inter',sans-serif;letter-spacing:.3px;
}
.fb:hover{color:var(--t1);border-color:var(--bdrh);background:rgba(124,58,237,.08)}
.fb.on{background:linear-gradient(135deg,var(--ac),var(--ac2));border-color:transparent;color:#fff;box-shadow:0 4px 16px var(--glow)}
.fsep{width:1px;height:20px;background:var(--bdr);margin:0 4px}
.rbtn{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--bdr);background:transparent;color:var(--t2);transition:all .2s;font-family:'Inter',sans-serif}
.rbtn:hover{color:var(--t1);border-color:var(--bdrh)}
.rbtn.spin svg{animation:rot .7s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}
#last-upd{font-size:11px;color:var(--t3);margin-left:2px}
.srch{margin-left:auto;display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--bdr);border-radius:10px;padding:7px 14px;transition:all .2s}
.srch:focus-within{border-color:var(--bdrh);box-shadow:0 0 0 3px rgba(124,58,237,.1)}
.srch input{background:none;border:none;outline:none;color:var(--t1);font-family:'Inter',sans-serif;font-size:13px;width:160px}
.srch input::placeholder{color:var(--t3)}

/* GRID — 4 Spalten */
#grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
@media(max-width:1200px){#grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:800px){#grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:480px){#grid{grid-template-columns:1fr}}

/* CARD */
.card{
  border-radius:14px;
  overflow:hidden;
  background:var(--card);
  border:1px solid var(--bdr);
  text-decoration:none;color:inherit;
  display:block;
  transition:transform .25s,box-shadow .25s,border-color .25s;
  animation:fi .5s cubic-bezier(.22,1,.36,1) both;
  position:relative;
}
.card::before{
  content:'';position:absolute;inset:0;z-index:0;
  background:linear-gradient(135deg,rgba(124,58,237,.05) 0%,transparent 60%);
  pointer-events:none;
}
.card:hover{
  transform:translateY(-6px) scale(1.02);
  box-shadow:0 20px 48px rgba(0,0,0,.7),0 0 0 1px var(--bdrh),0 0 32px var(--glow2);
  border-color:var(--bdrh);
}
.card.live-card:hover{
  box-shadow:0 20px 48px rgba(0,0,0,.7),0 0 0 1px rgba(239,68,68,.5),0 0 32px var(--redglow);
  border-color:rgba(239,68,68,.4);
}
@keyframes fi{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.card:nth-child(1){animation-delay:.04s}.card:nth-child(2){animation-delay:.08s}.card:nth-child(3){animation-delay:.12s}.card:nth-child(4){animation-delay:.16s}
.card:nth-child(5){animation-delay:.20s}.card:nth-child(6){animation-delay:.24s}.card:nth-child(7){animation-delay:.28s}.card:nth-child(8){animation-delay:.32s}
.card:nth-child(9){animation-delay:.36s}.card:nth-child(10){animation-delay:.40s}.card:nth-child(11){animation-delay:.44s}
.card.off{opacity:.55}.card.off:hover{opacity:1}

/* THUMBNAIL */
.thumb{position:relative;width:100%;aspect-ratio:16/9;overflow:hidden;background:#08051a}
.thumb img{width:100%;height:100%;object-fit:cover;transition:transform .5s;display:block}
.card:hover .thumb img{transform:scale(1.08)}

/* offline placeholder */
.tfall{
  width:100%;height:100%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;
  background:linear-gradient(135deg,#08051a 0%,#0d0820 100%);
}
.tfall svg{opacity:.12}
.tfall span{font-family:'Exo 2',sans-serif;font-size:11px;color:var(--t3);letter-spacing:2.5px;text-transform:uppercase}

/* overlay gradients */
.tgrad{
  position:absolute;bottom:0;left:0;right:0;height:70%;
  background:linear-gradient(to top,rgba(5,3,15,.98) 0%,rgba(5,3,15,.6) 40%,transparent 100%);
  pointer-events:none;z-index:1
}
.tshim{
  position:absolute;inset:0;
  background:linear-gradient(105deg,transparent 35%,rgba(124,58,237,.07) 50%,transparent 65%);
  background-size:200% 100%;animation:sw 3s linear infinite;
  pointer-events:none;z-index:2
}
@keyframes sw{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* LIVE BADGE */
.blive{
  position:absolute;top:10px;left:10px;z-index:3;
  display:flex;align-items:center;gap:5px;
  padding:3px 9px;border-radius:5px;
  font-family:'Exo 2',sans-serif;font-size:10px;font-weight:800;letter-spacing:1.2px;
  background:var(--live);color:#fff;
  box-shadow:0 2px 12px var(--redglow);
}
.blive .d{width:5px;height:5px;border-radius:50%;background:#fff;animation:pulse 1.4s infinite}
.boff{
  position:absolute;top:10px;left:10px;z-index:3;
  padding:3px 9px;border-radius:5px;
  font-family:'Exo 2',sans-serif;font-size:10px;font-weight:700;letter-spacing:.8px;
  background:rgba(5,3,15,.9);border:1px solid var(--bdr);color:var(--t3);
}
.bplat{
  position:absolute;top:10px;right:10px;z-index:3;
  width:22px;height:22px;border-radius:5px;
  display:grid;place-items:center;
  font-family:'Exo 2',sans-serif;font-size:11px;font-weight:800;
  background:#9146ff;color:#fff;
  box-shadow:0 2px 8px rgba(145,70,255,.4);
}

/* VIEWER COUNT — large, inside thumbnail */
.vcnt{
  position:absolute;bottom:10px;right:12px;z-index:3;
  display:flex;align-items:center;gap:5px;
  font-family:'Exo 2',sans-serif;font-size:18px;font-weight:800;
  color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.9);
  letter-spacing:-.5px;
}
.vcnt svg{opacity:.9}
.vcnt-label{font-size:10px;color:rgba(255,255,255,.6);font-weight:500;font-family:'Inter',sans-serif;margin-left:2px;align-self:flex-end;margin-bottom:2px;letter-spacing:.5px}

/* INFO BAR */
.info{padding:12px 13px 13px;position:relative;z-index:1}
.meta{display:flex;align-items:center;gap:10px}
.av{
  width:36px;height:36px;border-radius:50%;
  border:2px solid var(--ac);
  overflow:hidden;flex-shrink:0;
  background:var(--card2);
  display:grid;place-items:center;
  font-family:'Exo 2',sans-serif;font-weight:800;font-size:13px;color:var(--ac3);
  box-shadow:0 0 0 2px rgba(124,58,237,.15);
}
.av.lr{border-color:var(--live);box-shadow:0 0 0 2px rgba(239,68,68,.15),0 0 10px var(--redglow)}
.av img{width:100%;height:100%;object-fit:cover}
.tx{flex:1;min-width:0}
.sn{
  font-family:'Exo 2',sans-serif;font-size:15px;font-weight:700;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  letter-spacing:.2px;
}
.sg{font-size:11px;color:var(--t3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:400}
.vb-small{display:flex;align-items:center;gap:3px;font-family:'Exo 2',sans-serif;font-size:12px;font-weight:700;color:var(--ac3);flex-shrink:0}

/* BOTTOM ROW: tags + platform + viewers */
.card-bottom{
  display:flex;align-items:center;gap:6px;
  padding:0 13px 11px;position:relative;z-index:1;
  flex-wrap:nowrap;overflow:hidden;
}
.tgs{display:flex;gap:4px;flex:1;overflow:hidden}
.tg{
  padding:2px 8px;border-radius:20px;
  font-size:9px;font-weight:600;letter-spacing:.3px;
  background:rgba(124,58,237,.12);border:1px solid rgba(124,58,237,.25);color:var(--ac3);
  white-space:nowrap;flex-shrink:0;
}
.tg.game{background:rgba(34,197,94,.08);border-color:rgba(34,197,94,.25);color:#86efac}
.alink{font-size:10px;color:var(--ac2);text-decoration:none;opacity:.6;white-space:nowrap;flex-shrink:0;margin-left:auto;transition:opacity .2s}
.alink:hover{opacity:1}

/* live card accent line */
.card.live-card::after{
  content:'';
  position:absolute;top:0;left:0;right:0;height:2px;z-index:10;
  background:linear-gradient(90deg,transparent,var(--live),transparent);
  animation:scanline 2s linear infinite;
}
@keyframes scanline{0%{background-position:-200px}100%{background-position:200px}}

/* SKELETON */
.skel{border-radius:14px;overflow:hidden;background:var(--card);border:1px solid var(--bdr);animation:fi .4s ease both}
.skel-t{width:100%;aspect-ratio:16/9;background:linear-gradient(90deg,var(--card2) 25%,#18103a 50%,var(--card2) 75%);background-size:200% 100%;animation:sh 1.5s infinite}
.skel-i{padding:12px 13px 13px;display:flex;flex-direction:column;gap:9px}
.skel-l{height:11px;border-radius:6px;background:linear-gradient(90deg,var(--card2) 25%,#18103a 50%,var(--card2) 75%);background-size:200% 100%;animation:sh 1.5s infinite}
@keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}
</style>
</head>
<body>

<nav>
  <a class="logo" href="index.html">
    <div class="logo-icon">X</div>
    <div class="logo-text">X-<span>Roleplay</span></div>
  </a>
  <div class="nav-right">
    <div class="nav-badge"><em>LIVE</em> CREATOR HUB</div>
    <a class="nav-analytics" href="analytics.html">📊 Analytics</a>
    <div class="nav-live"><div class="nav-live-dot"></div>LIVE</div>
  </div>
</nav>

<main>
  <div class="header">
    <h1>Aktuell <em>Live</em></h1>
    <p>Unsere Streamer im Überblick</p>
    <div class="header-stats">
      <div class="hstat"><div class="hstat-val" id="cnt-live">–</div><div class="hstat-label">Live jetzt</div></div>
      <div class="hstat"><div class="hstat-val" id="cnt-viewers">–</div><div class="hstat-label">Zuschauer</div></div>
    </div>
  </div>

  <div class="fbar">
    <button class="fb on" onclick="setF(this,'all')">Alle</button>
    <button class="fb"    onclick="setF(this,'live')">🔴 Live</button>
    <button class="fb"    onclick="setF(this,'off')">⚫ Offline</button>
    <div class="fsep"></div>
    <button class="rbtn" id="rbtn" onclick="doRefresh()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M23 4v6h-6"/><path d="M1 20v-6h6"/>
        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
      </svg>
      Aktualisieren
    </button>
    <span id="last-upd"></span>
    <div class="srch">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#6b5a8a" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <input type="text" placeholder="Streamer suchen…" oninput="doSearch(this.value)">
    </div>
  </div>

  <div id="grid"></div>
</main>

<script>
const STREAMERS=[
  {login:'dero_tv_',        display:'Dero_TV',        tags:['GTA RP','Roleplay'],       ini:'DT'},
  {login:'d3viigirl',      display:'D3viiGirl',       tags:['Just Chatting','IRL'],     ini:'DG'},
  {login:'alessio_guzman', display:'Alessio_Guzman',  tags:['GTA RP','Action'],         ini:'AG'},
  {login:'keanuzien',      display:'KeanuzieN',       tags:['GTA RP','Drama'],          ini:'KZ'},
  {login:'reda__7272',     display:'Reda__7272',      tags:['Roleplay','Chat'],         ini:'RE'},
  {login:'harryyyys',      display:'Harryyyys',       tags:['GTA RP','Chill'],          ini:'HA'},
  {login:'tayo_rulo',      display:'Tayo_Rulo',       tags:['GTA RP','Roleplay'],       ini:'TR'},
  {login:'dayiasena',      display:'Dayiasena',       tags:['Just Chatting','Variety'], ini:'DA'},
  {login:'taypacino',      display:'TayPacino',       tags:['GTA RP','Crime'],          ini:'TP'},
  {login:'bladinostv',     display:'BladinosTV',      tags:['GTA RP','Roleplay'],       ini:'BL'},
  {login:'denob07',        display:'Dajo',            tags:['GTA RP','Roleplay'],       ini:'DN'},
  {login:'realneotv_nrw',  display:'RealNeoTV_NRW',   tags:['GTA RP','Roleplay'],       ini:'RN'},
  {login:'realneotv_nrw',  display:'RealNeoTV_NRW',   tags:['GTA RP','Roleplay'],       ini:'RN'},
  {login:'realneotv_nrw',  display:'RealNeoTV_NRW',   tags:['GTA RP','Roleplay'],       ini:'RN'},
];

let clientId=null,token=null,streamData={},userProfiles={},curFilter='all',curSearch='';
function fv(n){return n>=1000?(n/1000).toFixed(1)+'K':n}
function trunc(s,n){return s&&s.length>n?s.slice(0,n)+'…':s||''}

async function init(){
  showSkeletons();
  try{
    const r=await fetch('/api/token');
    const d=await r.json();
    token=d.access_token;clientId=d.client_id;
    await loadAll();startAutoRefresh();
  }catch(e){showError();}
}
async function twitchGet(url){
  const r=await fetch(url,{headers:{'Client-ID':clientId,'Authorization':'Bearer '+token}});
  if(r.status===401){const d=await(await fetch('/api/token')).json();token=d.access_token;clientId=d.client_id;return twitchGet(url);}
  return r.json();
}
async function loadAll(){
  const q=STREAMERS.map(s=>'user_login='+s.login).join('&');
  const d=await twitchGet(`https://api.twitch.tv/helix/streams?${q}&first=100`);
  streamData={};
  for(const s of d.data) streamData[s.user_login.toLowerCase()]=s;
  if(!Object.keys(userProfiles).length){
    const q2=STREAMERS.map(s=>'login='+s.login).join('&');
    const d2=await twitchGet(`https://api.twitch.tv/helix/users?${q2}`);
    for(const u of d2.data) userProfiles[u.login.toLowerCase()]=u;
  }
  fetch('/api/track').catch(()=>{});
  render();updateStats();
  document.getElementById('last-upd').textContent='Zuletzt: '+new Date().toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'})+' Uhr';
}

function buildCard(s){
  const st=streamData[s.login]||null,live=!!st;
  const prof=userProfiles[s.login]||{};
  const name=prof.display_name||s.display;
  const av=prof.profile_image_url||'';
  const game=st?.game_name||'';
  const title=trunc(st?.title||'',42);
  const views=st?.viewer_count||0;
  const allTags=game?[game,...s.tags]:s.tags;

  const tInner=live
    ?`<img src="${st.thumbnail_url.replace('{width}','640').replace('{height}','360')}?t=${Date.now()}" alt="${name}">`
    :`<div class="tfall">
        <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="#7c3aed" stroke-width=".9">
          <path d="M21 2H3v16h5v4l4-4h5l4-4V2z"/>
          <line x1="9" y1="9" x2="9" y2="14"/><line x1="14" y1="9" x2="14" y2="14"/>
        </svg>
        <span>Offline</span>
      </div>`;

  const avInner=av
    ?`<img src="${av}" alt="${name}" onerror="this.style.display='none';this.parentElement.textContent='${s.ini}'">`
    :s.ini;

  return `
<a class="card${live?' live-card':' off'}" href="https://www.twitch.tv/${s.login}" target="_blank" rel="noopener">
  <div class="thumb">
    ${tInner}
    <div class="tgrad"></div><div class="tshim"></div>
    ${live?`<div class="blive"><div class="d"></div>LIVE</div>`:`<div class="boff">OFFLINE</div>`}
    <div class="bplat">T</div>
    ${live?`<div class="vcnt">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
      </svg>
      ${fv(views)}<span class="vcnt-label">Zuschauer</span>
    </div>`:''}
  </div>
  <div class="info">
    <div class="meta">
      <div class="av${live?' lr':''}">${avInner}</div>
      <div class="tx">
        <div class="sn">${name}</div>
        <div class="sg">${live?(title||game||'Twitch Stream'):'Nicht live'}</div>
      </div>
    </div>
  </div>
  <div class="card-bottom">
    <div class="tgs">
      ${allTags.slice(0,2).map((t,i)=>`<span class="tg${i===0&&live&&game?' game':''}">${t}</span>`).join('')}
    </div>
    <a class="alink" href="analytics.html?streamer=${s.login}" onclick="event.stopPropagation()">📊 Stats</a>
  </div>
</a>`;
}

function render(){
  let list=[...STREAMERS];
  list.sort((a,b)=>{
    const al=!!streamData[a.login],bl=!!streamData[b.login];
    if(al!==bl)return bl-al;
    return(streamData[b.login]?.viewer_count||0)-(streamData[a.login]?.viewer_count||0);
  });
  if(curFilter==='live') list=list.filter(s=> streamData[s.login]);
  if(curFilter==='off')  list=list.filter(s=>!streamData[s.login]);
  if(curSearch) list=list.filter(s=>s.display.toLowerCase().includes(curSearch)||s.login.includes(curSearch));
  document.getElementById('grid').innerHTML=list.length
    ?list.map(buildCard).join('')
    :`<div style="grid-column:1/-1;padding:60px;text-align:center;color:var(--t3);font-family:'Exo 2',sans-serif">Keine Streamer gefunden.</div>`;
}
function updateStats(){
  const live=STREAMERS.filter(s=>streamData[s.login]);
  document.getElementById('cnt-live').textContent=live.length;
  document.getElementById('cnt-viewers').textContent=fv(live.reduce((a,s)=>a+(streamData[s.login]?.viewer_count||0),0))||'0';
}
function showSkeletons(){
  document.getElementById('grid').innerHTML=Array.from({length:11},(_,i)=>`
    <div class="skel" style="animation-delay:${i*.04}s">
      <div class="skel-t"></div>
      <div class="skel-i">
        <div style="display:flex;gap:10px;align-items:center">
          <div style="width:36px;height:36px;border-radius:50%;flex-shrink:0;background:linear-gradient(90deg,var(--card2) 25%,#18103a 50%,var(--card2) 75%);background-size:200% 100%;animation:sh 1.5s infinite"></div>
          <div style="flex:1;display:flex;flex-direction:column;gap:7px">
            <div class="skel-l" style="width:55%"></div>
            <div class="skel-l" style="width:35%"></div>
          </div>
        </div>
      </div>
    </div>`).join('');
}
function showError(){
  document.getElementById('grid').innerHTML=`<div style="grid-column:1/-1;padding:50px;text-align:center;color:var(--t3)">
    Verbindungsfehler – <button onclick="location.reload()" style="background:linear-gradient(135deg,var(--ac),var(--ac2));border:none;color:#fff;padding:8px 18px;border-radius:8px;cursor:pointer;margin-left:10px;font-family:'Exo 2',sans-serif;font-weight:700">Neu laden</button>
  </div>`;
}
function setF(btn,val){document.querySelectorAll('.fb').forEach(b=>b.classList.remove('on'));btn.classList.add('on');curFilter=val;render();}
function doSearch(v){curSearch=v.toLowerCase();render();}
async function doRefresh(){const btn=document.getElementById('rbtn');btn.classList.add('spin');try{await loadAll();}catch(e){}btn.classList.remove('spin');}
function startAutoRefresh(){setInterval(async()=>{try{await loadAll();}catch(e){}},60000);}
init();
</script>
</body>
</html>
