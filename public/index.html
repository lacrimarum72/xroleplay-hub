<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>X-Roleplay – Live Creator Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080b14;--card:#0d1120;--panel:#111827;
  --ac:#8b5cf6;--acb:#a78bfa;--glow:rgba(139,92,246,.3);
  --red:#ef4444;--bdr:rgba(139,92,246,.15);--bdrh:rgba(139,92,246,.4);
  --t1:#f1f5f9;--t2:#94a3b8;--t3:#475569;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 20% 10%,rgba(139,92,246,.07) 0%,transparent 60%);pointer-events:none;z-index:0}

nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:56px;background:rgba(8,11,20,.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--bdr)}
.logo{display:flex;align-items:center;gap:8px;text-decoration:none;color:var(--t1)}
.logo-x{width:27px;height:27px;background:var(--ac);clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%);display:grid;place-items:center;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:12px;color:#fff}
.logo span{font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;letter-spacing:1px}
.ntabs{display:flex;gap:3px}
.ntab{padding:5px 14px;border-radius:6px;font-size:13px;font-weight:500;color:var(--t2);transition:all .2s;border:1px solid transparent;text-decoration:none;display:block}
.ntab:hover{color:var(--t1);background:var(--panel)}
.ntab.on{color:var(--acb);background:rgba(139,92,246,.1);border-color:var(--bdr)}
.pill{display:flex;align-items:center;gap:6px;padding:4px 10px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:20px;font-size:11px;font-weight:700;color:#fca5a5;letter-spacing:.9px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--red);animation:blink 1.5s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

main{position:relative;z-index:1;max-width:1440px;margin:0 auto;padding:24px 20px 60px}
.ph{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:12px}
.ph h1{font-family:'Rajdhani',sans-serif;font-size:28px;font-weight:700;line-height:1}
.ph h1 em{color:var(--acb);font-style:normal}
.ph p{margin-top:4px;color:var(--t2);font-size:13px}
.sts{display:flex;gap:20px}
.st .v{font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;color:var(--acb);line-height:1}
.st .l{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;margin-top:2px;text-align:right}

.fbar{display:flex;align-items:center;gap:6px;margin-bottom:18px;flex-wrap:wrap}
.fb{padding:5px 12px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--bdr);background:transparent;color:var(--t2);transition:all .2s;font-family:'Outfit',sans-serif}
.fb:hover{color:var(--t1);border-color:var(--bdrh)}
.fb.on{background:var(--ac);border-color:var(--ac);color:#fff}
.fsep{width:1px;height:16px;background:var(--bdr);margin:0 2px}
.rbtn{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:6px;font-size:12px;cursor:pointer;border:1px solid var(--bdr);background:transparent;color:var(--t2);transition:all .2s;font-family:'Outfit',sans-serif}
.rbtn:hover{color:var(--t1);border-color:var(--bdrh)}
.rbtn.spin svg{animation:rot .7s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}
#last-upd{font-size:11px;color:var(--t3);margin-left:2px}
.srch{margin-left:auto;display:flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--bdr);border-radius:7px;padding:5px 11px;transition:border-color .2s}
.srch:focus-within{border-color:var(--bdrh)}
.srch input{background:none;border:none;outline:none;color:var(--t1);font-family:'Outfit',sans-serif;font-size:12px;width:140px}
.srch input::placeholder{color:var(--t3)}

/* ═══════════════════════════════════════════
   GRID: 4 Spalten × N Zeilen
   Jede Zelle = feste Höhe 240px
═══════════════════════════════════════════ */
#grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  grid-auto-rows:240px;
  gap:12px;
}
@media(max-width:1100px){#grid{grid-template-columns:repeat(3,1fr);grid-auto-rows:220px}}
@media(max-width:750px) {#grid{grid-template-columns:repeat(2,1fr);grid-auto-rows:200px}}
@media(max-width:480px) {#grid{grid-template-columns:1fr;grid-auto-rows:220px}}

/* ═══════════════════════════════════════════
   KACHEL
   Jede Kachel = exakt die Grid-Zelle
   Thumbnail oben (feste px), Info unten (feste px)
═══════════════════════════════════════════ */
.card{
  display:block;
  width:100%;
  height:100%;        /* füllt die Grid-Zelle komplett */
  border-radius:10px;
  overflow:hidden;    /* alles was rausragt wird abgeschnitten */
  background:var(--card);
  border:1px solid var(--bdr);
  text-decoration:none;
  color:inherit;
  position:relative;
  transition:transform .2s,box-shadow .2s,border-color .2s;
  animation:fi .4s ease both;
}
.card:hover{
  transform:translateY(-2px) scale(1.008);
  box-shadow:0 10px 28px rgba(0,0,0,.6),0 0 0 1px var(--bdrh),0 0 18px var(--glow);
  border-color:var(--bdrh);
}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.card:nth-child(1){animation-delay:.02s}.card:nth-child(2){animation-delay:.05s}.card:nth-child(3){animation-delay:.08s}.card:nth-child(4){animation-delay:.11s}
.card:nth-child(5){animation-delay:.14s}.card:nth-child(6){animation-delay:.17s}.card:nth-child(7){animation-delay:.20s}.card:nth-child(8){animation-delay:.23s}
.card:nth-child(9){animation-delay:.26s}.card:nth-child(10){animation-delay:.29s}.card:nth-child(11){animation-delay:.32s}
.card.off{opacity:.6}
.card.off:hover{opacity:1}

/* THUMBNAIL: von oben bis zur Info-Leiste */
.thumb{
  position:absolute;
  top:0; left:0; right:0;
  bottom:64px;  /* Platz für Info-Leiste */
  overflow:hidden;
  background:#060810;
}
.thumb img{
  width:100%;height:100%;
  object-fit:cover;
  display:block;
  transition:transform .35s;
}
.card:hover .thumb img{transform:scale(1.05)}

/* Offline */
.tfall{
  width:100%;height:100%;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:8px;
}
.tfall svg{opacity:.1}
.tfall span{font-family:'Rajdhani',sans-serif;font-size:10px;color:var(--t3);letter-spacing:2px}

.tgrad{position:absolute;bottom:0;left:0;right:0;height:50%;background:linear-gradient(to top,rgba(6,8,16,.95),transparent);pointer-events:none;z-index:1}
.tshim{position:absolute;inset:0;background:linear-gradient(105deg,transparent 40%,rgba(139,92,246,.04) 50%,transparent 60%);background-size:200% 100%;animation:sw 3s linear infinite;pointer-events:none;z-index:2}
@keyframes sw{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* Badges */
.blive{position:absolute;top:8px;left:8px;z-index:3;display:flex;align-items:center;gap:4px;padding:2px 7px;border-radius:4px;font-size:9px;font-weight:700;letter-spacing:1px;background:var(--red);color:#fff}
.blive .d{width:4px;height:4px;border-radius:50%;background:#fff;animation:blink 1.4s infinite}
.boff{position:absolute;top:8px;left:8px;z-index:3;padding:2px 7px;border-radius:4px;font-size:9px;font-weight:600;letter-spacing:.8px;background:rgba(6,8,16,.9);border:1px solid var(--bdr);color:var(--t3)}
.bplat{position:absolute;top:8px;right:8px;z-index:3;width:18px;height:18px;border-radius:3px;display:grid;place-items:center;font-size:10px;font-weight:700;background:#9146ff;color:#fff}
.vcnt{position:absolute;bottom:5px;right:8px;z-index:3;display:flex;align-items:center;gap:3px;font-size:11px;font-weight:600;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.9)}

/* INFO-LEISTE: exakt unten, feste 64px Höhe */
.info{
  position:absolute;
  bottom:0; left:0; right:0;
  height:64px;
  padding:6px 10px 6px;
  background:var(--card);
  border-top:1px solid rgba(139,92,246,.1);
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  overflow:hidden;
}
/* Zeile 1: Avatar + Name + Zuschauer */
.row1{display:flex;align-items:center;gap:7px;min-width:0}
.av{width:26px;height:26px;min-width:26px;border-radius:50%;border:2px solid var(--ac);overflow:hidden;background:var(--panel);display:grid;place-items:center;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:10px;color:var(--acb)}
.av.lr{border-color:var(--red)}
.av img{width:100%;height:100%;object-fit:cover}
.sn{font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
.vb{display:flex;align-items:center;gap:2px;font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:600;color:var(--acb);white-space:nowrap;flex-shrink:0}
/* Zeile 2: Tags + Link */
.row2{display:flex;align-items:center;gap:4px;overflow:hidden}
.tgs{display:flex;gap:3px;overflow:hidden;flex:1;min-width:0}
.tg{padding:1px 5px;border-radius:3px;font-size:8px;font-weight:600;background:rgba(139,92,246,.12);border:1px solid rgba(139,92,246,.2);color:var(--acb);white-space:nowrap}
.tg.game{background:rgba(34,197,94,.08);border-color:rgba(34,197,94,.2);color:#86efac}
.alink{font-size:9px;color:var(--ac);text-decoration:none;white-space:nowrap;opacity:.6;flex-shrink:0}
.alink:hover{opacity:1}

/* SKELETON */
.skel{border-radius:10px;overflow:hidden;background:var(--card);border:1px solid var(--bdr);animation:fi .4s ease both;height:100%;position:relative}
.skel-t{position:absolute;top:0;left:0;right:0;bottom:64px;background:linear-gradient(90deg,var(--panel) 25%,#161d30 50%,var(--panel) 75%);background-size:200% 100%;animation:sh 1.4s infinite}
.skel-i{position:absolute;bottom:0;left:0;right:0;height:64px;padding:8px 10px;display:flex;flex-direction:column;gap:7px;justify-content:center}
.skel-l{height:9px;border-radius:3px;background:linear-gradient(90deg,var(--panel) 25%,#161d30 50%,var(--panel) 75%);background-size:200% 100%;animation:sh 1.4s infinite}
@keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}
</style>
</head>
<body>

<nav>
  <a class="logo" href="index.html"><div class="logo-x">X</div><span>X-Roleplay</span></a>
  <div class="ntabs">
    <a class="ntab on" href="index.html">Live Hub</a>
    <a class="ntab"    href="analytics.html">Analytics</a>
  </div>
  <div class="pill"><div class="dot"></div>LIVE</div>
</nav>

<main>
  <div class="ph">
    <div>
      <h1>Aktuell <em>Live</em></h1>
      <p>Unsere Streamer im Überblick — Echtzeit-Daten via Twitch API</p>
    </div>
    <div class="sts">
      <div class="st"><div class="v" id="cnt-live">–</div><div class="l">Live jetzt</div></div>
      <div class="st"><div class="v" id="cnt-viewers">–</div><div class="l">Zuschauer</div></div>
    </div>
  </div>

  <div class="fbar">
    <button class="fb on" onclick="setF(this,'all')">Alle</button>
    <button class="fb"    onclick="setF(this,'live')">🔴 Live</button>
    <button class="fb"    onclick="setF(this,'off')">⚫ Offline</button>
    <div class="fsep"></div>
    <button class="rbtn" id="rbtn" onclick="doRefresh()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M23 4v6h-6"/><path d="M1 20v-6h6"/>
        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
      </svg>
      Aktualisieren
    </button>
    <span id="last-upd"></span>
    <div class="srch">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <input type="text" placeholder="Streamer suchen…" oninput="doSearch(this.value)">
    </div>
  </div>

  <div id="grid"></div>
</main>

<script>
const STREAMERS=[
  {login:'dero_tv',        display:'Dero_TV',        tags:['GTA RP','Roleplay'],       ini:'DT'},
  {login:'d3viigirl',      display:'D3viiGirl',       tags:['Just Chatting','IRL'],     ini:'DG'},
  {login:'alessio_guzman', display:'Alessio_Guzman',  tags:['GTA RP','Action'],         ini:'AG'},
  {login:'keanuzien',      display:'KeanuzieN',       tags:['GTA RP','Drama'],          ini:'KZ'},
  {login:'reda__7272',     display:'Reda__7272',      tags:['Roleplay','Chat'],         ini:'RE'},
  {login:'harryyyys',      display:'Harryyyys',       tags:['GTA RP','Chill'],          ini:'HA'},
  {login:'tayo_rulo',      display:'Tayo_Rulo',       tags:['GTA RP','Roleplay'],       ini:'TR'},
  {login:'dayiasena',      display:'Dayiasena',       tags:['Just Chatting','Variety'], ini:'DA'},
  {login:'taypacino',      display:'TayPacino',       tags:['GTA RP','Crime'],          ini:'TP'},
  {login:'bladinostv',     display:'BladinosTV',      tags:['GTA RP','Roleplay'],       ini:'BL'},
  {login:'realneotv_nrw',  display:'RealNeoTV_NRW',   tags:['GTA RP','Roleplay'],       ini:'RN'},
];

let clientId=null,token=null,streamData={},userProfiles={},curFilter='all',curSearch='';
function fv(n){return n>=1000?(n/1000).toFixed(1)+'K':n}
function trunc(s,n){return s&&s.length>n?s.slice(0,n)+'…':s||''}

async function init(){
  showSkeletons();
  try{
    const r=await fetch('/api/token');
    const d=await r.json();
    token=d.access_token;clientId=d.client_id;
    await loadAll();startAutoRefresh();
  }catch(e){showError();}
}

async function twitchGet(url){
  const r=await fetch(url,{headers:{'Client-ID':clientId,'Authorization':'Bearer '+token}});
  if(r.status===401){const d=await(await fetch('/api/token')).json();token=d.access_token;clientId=d.client_id;return twitchGet(url);}
  return r.json();
}

async function loadAll(){
  const q=STREAMERS.map(s=>'user_login='+s.login).join('&');
  const d=await twitchGet(`https://api.twitch.tv/helix/streams?${q}&first=100`);
  streamData={};
  for(const s of d.data) streamData[s.user_login.toLowerCase()]=s;
  if(!Object.keys(userProfiles).length){
    const q2=STREAMERS.map(s=>'login='+s.login).join('&');
    const d2=await twitchGet(`https://api.twitch.tv/helix/users?${q2}`);
    for(const u of d2.data) userProfiles[u.login.toLowerCase()]=u;
  }
  fetch('/api/track').catch(()=>{});
  render();updateStats();
  document.getElementById('last-upd').textContent='Zuletzt: '+new Date().toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'})+' Uhr';
}

function buildCard(s){
  const st=streamData[s.login]||null,live=!!st;
  const prof=userProfiles[s.login]||{};
  const name=prof.display_name||s.display;
  const av=prof.profile_image_url||'';
  const game=st?.game_name||'';
  const title=trunc(st?.title||'',38);
  const views=st?.viewer_count||0;
  const allTags=game?[game,...s.tags]:s.tags;

  const tInner=live
    ?`<img src="${st.thumbnail_url.replace('{width}','640').replace('{height}','360')}?t=${Date.now()}" alt="${name}">`
    :`<div class="tfall">
        <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="#8b5cf6" stroke-width="1">
          <path d="M21 2H3v16h5v4l4-4h5l4-4V2z"/>
          <line x1="9" y1="9" x2="9" y2="14"/><line x1="14" y1="9" x2="14" y2="14"/>
        </svg>
        <span>OFFLINE</span>
      </div>`;

  const avInner=av
    ?`<img src="${av}" alt="${name}" onerror="this.style.display='none';this.parentElement.textContent='${s.ini}'">`
    :s.ini;

  return `
<a class="card${live?'':' off'}" href="https://www.twitch.tv/${s.login}" target="_blank" rel="noopener">
  <div class="thumb">
    ${tInner}
    <div class="tgrad"></div><div class="tshim"></div>
    ${live?`<div class="blive"><div class="d"></div>LIVE</div>`:`<div class="boff">OFFLINE</div>`}
    <div class="bplat">T</div>
    ${live?`<div class="vcnt">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
      </svg>${fv(views)}</div>`:''}
  </div>
  <div class="info">
    <div class="row1">
      <div class="av${live?' lr':''}">${avInner}</div>
      <div class="sn">${name}</div>
      ${live?`<div class="vb">
        <svg width="9" height="9" viewBox="0 0 24 24" fill="currentColor">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>${fv(views)}</div>`:''}
    </div>
    <div class="row2">
      <div class="tgs">
        ${allTags.slice(0,3).map((t,i)=>`<span class="tg${i===0&&live&&game?' game':''}">${t}</span>`).join('')}
      </div>
      <a class="alink" href="analytics.html?streamer=${s.login}" onclick="event.stopPropagation()">📊 Auswertung →</a>
    </div>
  </div>
</a>`;
}

function render(){
  let list=[...STREAMERS];
  list.sort((a,b)=>{
    const al=!!streamData[a.login],bl=!!streamData[b.login];
    if(al!==bl)return bl-al;
    return(streamData[b.login]?.viewer_count||0)-(streamData[a.login]?.viewer_count||0);
  });
  if(curFilter==='live') list=list.filter(s=> streamData[s.login]);
  if(curFilter==='off')  list=list.filter(s=>!streamData[s.login]);
  if(curSearch) list=list.filter(s=>s.display.toLowerCase().includes(curSearch)||s.login.includes(curSearch));
  document.getElementById('grid').innerHTML=list.length
    ?list.map(buildCard).join('')
    :`<div style="grid-column:1/-1;padding:60px;text-align:center;color:var(--t3)">Keine Streamer gefunden.</div>`;
}

function updateStats(){
  const live=STREAMERS.filter(s=>streamData[s.login]);
  document.getElementById('cnt-live').textContent=live.length;
  document.getElementById('cnt-viewers').textContent=fv(live.reduce((a,s)=>a+(streamData[s.login]?.viewer_count||0),0))||'0';
}

function showSkeletons(){
  document.getElementById('grid').innerHTML=Array.from({length:11},(_,i)=>`
    <div class="skel" style="animation-delay:${i*.03}s">
      <div class="skel-t"></div>
      <div class="skel-i">
        <div class="skel-l" style="width:50%"></div>
        <div class="skel-l" style="width:30%"></div>
      </div>
    </div>`).join('');
}

function showError(){
  document.getElementById('grid').innerHTML=`<div style="grid-column:1/-1;padding:50px;text-align:center;color:var(--t3)">
    Verbindungsfehler –
    <button onclick="location.reload()" style="background:var(--ac);border:none;color:#fff;padding:6px 14px;border-radius:6px;cursor:pointer;margin-left:8px;font-family:Outfit,sans-serif">Neu laden</button>
  </div>`;
}

function setF(btn,val){document.querySelectorAll('.fb').forEach(b=>b.classList.remove('on'));btn.classList.add('on');curFilter=val;render();}
function doSearch(v){curSearch=v.toLowerCase();render();}
async function doRefresh(){const btn=document.getElementById('rbtn');btn.classList.add('spin');try{await loadAll();}catch(e){}btn.classList.remove('spin');}
function startAutoRefresh(){setInterval(async()=>{try{await loadAll();}catch(e){}},60000);}
init();
</script>
</body>
</html>
